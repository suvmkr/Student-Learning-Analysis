<svg viewBox="0 0 1300 760" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="1300" height="760" fill="#ffffff"/>

  <!-- Title -->
  <text x="650" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2937">Silver &amp; Gold Table Reference — Grain &amp; Key Columns</text>
  <text x="650" y="60" text-anchor="middle" font-size="13" fill="#6b7280">Fed by: lms_events_bronze · quiz_attempts_bronze · video_events_bronze · discussion_forum_bronze · enrollments_bronze · course_catalog_bronze</text>

  <!-- Layer labels -->
  <text x="40" y="105" font-size="15" font-weight="700" fill="#6b7280">SILVER</text>
  <text x="40" y="425" font-size="15" font-weight="700" fill="#b8860b">GOLD</text>

  <!-- ===== SILVER ROW ===== -->
  <!-- Card 1: learning_sessions -->
  <g>
    <rect x="30" y="120" width="390" height="270" rx="12" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
    <rect x="30" y="120" width="390" height="42" rx="12" fill="#94a3b8"/>
    <rect x="30" y="150" width="390" height="12" fill="#94a3b8"/>
    <text x="50" y="147" font-size="15" font-weight="700" fill="#ffffff">learning_sessions</text>
    <text x="50" y="185" font-size="12" font-weight="700" fill="#374151">Grain: one row per session</text>
    <text x="50" y="207" font-size="11" font-weight="700" fill="#6b7280">Key columns</text>
    <text x="50" y="226" font-size="11" fill="#374151">session_id, student_id, course_id</text>
    <text x="50" y="244" font-size="11" fill="#374151">session_start, session_end</text>
    <text x="50" y="262" font-size="11" fill="#374151">session_duration_mins</text>
    <text x="50" y="280" font-size="11" fill="#374151">events_in_session, modules_touched</text>
    <text x="50" y="298" font-size="11" fill="#374151">primary_activity</text>
    <text x="50" y="316" font-size="11" fill="#374151">is_suspicious_session (&gt;480 min)</text>
    <text x="50" y="345" font-size="10.5" fill="#9ca3af">Session = events &lt;30 min apart</text>
    <text x="50" y="362" font-size="10.5" fill="#9ca3af">(LAG + cumulative SUM window)</text>
  </g>

  <!-- Card 2: student_course_engagement -->
  <g>
    <rect x="455" y="120" width="390" height="270" rx="12" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
    <rect x="455" y="120" width="390" height="42" rx="12" fill="#94a3b8"/>
    <rect x="455" y="150" width="390" height="12" fill="#94a3b8"/>
    <text x="475" y="147" font-size="15" font-weight="700" fill="#ffffff">student_course_engagement</text>
    <text x="475" y="185" font-size="12" font-weight="700" fill="#374151">Grain: student_id + course_id</text>
    <text x="475" y="207" font-size="11" font-weight="700" fill="#6b7280">Key columns</text>
    <text x="475" y="226" font-size="11" fill="#374151">total_video_minutes_watched</text>
    <text x="475" y="244" font-size="11" fill="#374151">video_completion_rate</text>
    <text x="475" y="262" font-size="11" fill="#374151">quiz_pass_rate, quiz_attempts_count</text>
    <text x="475" y="280" font-size="11" fill="#374151">discussion_posts_count</text>
    <text x="475" y="298" font-size="11" fill="#374151">login_count_7d, login_count_30d</text>
    <text x="475" y="316" font-size="11" fill="#374151">days_since_last_active</text>
    <text x="475" y="334" font-size="11" fill="#374151">engagement_trend (IMPROVING/STABLE/DECLINING)</text>
    <text x="475" y="362" font-size="10.5" fill="#9ca3af">Master input for dropout risk scoring</text>
  </g>

  <!-- Card 3: enrollment_risk_profile -->
  <g>
    <rect x="880" y="120" width="390" height="270" rx="12" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
    <rect x="880" y="120" width="390" height="42" rx="12" fill="#94a3b8"/>
    <rect x="880" y="150" width="390" height="12" fill="#94a3b8"/>
    <text x="900" y="147" font-size="15" font-weight="700" fill="#ffffff">enrollment_risk_profile</text>
    <text x="900" y="185" font-size="12" font-weight="700" fill="#374151">Grain: student_id + course_id (weekly)</text>
    <text x="900" y="207" font-size="11" font-weight="700" fill="#6b7280">Key columns</text>
    <text x="900" y="226" font-size="11" fill="#374151">risk_tier (HIGH / MEDIUM / LOW)</text>
    <text x="900" y="244" font-size="11" fill="#374151">week, prev_risk</text>
    <text x="900" y="262" font-size="11" fill="#374151">risk_worsened (0/1 flag)</text>
    <text x="900" y="280" font-size="11" fill="#374151">+ all engagement features used</text>
    <text x="900" y="298" font-size="11" fill="#374151">  in classification (inherited)</text>
    <text x="900" y="334" font-size="10.5" fill="#9ca3af">week-over-week LAG for longitudinal</text>
    <text x="900" y="350" font-size="10.5" fill="#9ca3af">risk tracking</text>
  </g>

  <!-- Arrows Silver -> Gold -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#b8860b"/>
    </marker>
  </defs>
  <line x1="650" y1="390" x2="650" y2="428" stroke="#b8860b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1075" y1="390" x2="1075" y2="428" stroke="#b8860b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="225" y1="390" x2="225" y2="410" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="225" y1="410" x2="480" y2="410" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="480" y1="410" x2="480" y2="428" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- ===== GOLD ROW ===== -->
  <!-- Card 4: course_performance_daily -->
  <g>
    <rect x="30" y="440" width="390" height="290" rx="12" fill="#fffbeb" stroke="#d4a017" stroke-width="1.5"/>
    <rect x="30" y="440" width="390" height="42" rx="12" fill="#f4b400"/>
    <rect x="30" y="470" width="390" height="12" fill="#f4b400"/>
    <text x="50" y="467" font-size="15" font-weight="700" fill="#3f2f00">course_performance_daily</text>
    <text x="50" y="505" font-size="12" font-weight="700" fill="#374151">Grain: course_id + report_date</text>
    <text x="50" y="527" font-size="11" font-weight="700" fill="#6b7280">Key columns</text>
    <text x="50" y="546" font-size="11" fill="#374151">active_students, completion_rate</text>
    <text x="50" y="564" font-size="11" fill="#374151">avg_quiz_score, avg_video_completion_pct</text>
    <text x="50" y="582" font-size="11" fill="#374151">new_enrollments, dropout_count</text>
    <text x="50" y="600" font-size="11" fill="#374151">avg_engagement_score</text>
    <text x="50" y="618" font-size="11" fill="#374151">instructor_response_rate</text>
    <text x="50" y="646" font-size="10.5" fill="#9ca3af">Partitioned by report_date</text>
    <text x="50" y="662" font-size="10.5" fill="#9ca3af">Z-ORDER BY course_id</text>
    <text x="50" y="678" font-size="10.5" fill="#9ca3af">Refresh: daily 06:00, SLA 07:00</text>
  </g>

  <!-- Card 5: instructor_dashboard -->
  <g>
    <rect x="455" y="440" width="390" height="290" rx="12" fill="#fffbeb" stroke="#d4a017" stroke-width="1.5"/>
    <rect x="455" y="440" width="390" height="42" rx="12" fill="#f4b400"/>
    <rect x="455" y="470" width="390" height="12" fill="#f4b400"/>
    <text x="475" y="467" font-size="15" font-weight="700" fill="#3f2f00">instructor_dashboard</text>
    <text x="475" y="505" font-size="12" font-weight="700" fill="#374151">Grain: instructor_id (weekly, report_week)</text>
    <text x="475" y="527" font-size="11" font-weight="700" fill="#6b7280">Key columns</text>
    <text x="475" y="546" font-size="11" fill="#374151">active_courses, total_active_students</text>
    <text x="475" y="564" font-size="11" fill="#374151">avg_completion_rate</text>
    <text x="475" y="582" font-size="11" fill="#374151">avg_student_satisfaction (quiz-pass proxy)</text>
    <text x="475" y="600" font-size="11" fill="#374151">students_at_high_dropout_risk</text>
    <text x="475" y="618" font-size="11" fill="#374151">performance_rank, completion_trend</text>
    <text x="475" y="646" font-size="10.5" fill="#9ca3af">performance_rank = RANK() OVER</text>
    <text x="475" y="662" font-size="10.5" fill="#9ca3af">  (ORDER BY avg_completion_rate DESC)</text>
    <text x="475" y="678" font-size="10.5" fill="#9ca3af">Refresh: weekly, Monday</text>
  </g>

  <!-- Card 6: course_completion_funnel -->
  <g>
    <rect x="880" y="440" width="390" height="290" rx="12" fill="#fffbeb" stroke="#d4a017" stroke-width="1.5"/>
    <rect x="880" y="440" width="390" height="42" rx="12" fill="#f4b400"/>
    <rect x="880" y="470" width="390" height="12" fill="#f4b400"/>
    <text x="900" y="467" font-size="15" font-weight="700" fill="#3f2f00">course_completion_funnel</text>
    <text x="900" y="505" font-size="12" font-weight="700" fill="#374151">Grain: course_id (+ cohort_quarter)</text>
    <text x="900" y="527" font-size="11" font-weight="700" fill="#6b7280">Key columns</text>
    <text x="900" y="546" font-size="11" fill="#374151">enrolled_count, started_pct</text>
    <text x="900" y="564" font-size="11" fill="#374151">q25_pct, q50_pct, q75_pct, completed_pct</text>
    <text x="900" y="582" font-size="11" fill="#374151">biggest_dropoff_stage</text>
    <text x="900" y="600" font-size="11" fill="#374151">analysis_scope (COURSE_OVERALL /</text>
    <text x="900" y="618" font-size="11" fill="#374151">  COHORT_ANALYSIS)</text>
    <text x="900" y="646" font-size="10.5" fill="#9ca3af">Funnel: enrolled→started→25→50→75→completed</text>
    <text x="900" y="662" font-size="10.5" fill="#9ca3af">Cohorts compared by enrollment quarter</text>
  </g>
</svg>
